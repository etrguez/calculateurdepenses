# =============================================
# DOCKER-COMPOSE - CALCULATEUR DE DÉPENSES
# Nginx + PHP-FPM (MariaDB externe / mutualisée Coolify)
# =============================================
#
# Coolify : Build Pack = Docker Compose (pas Nixpacks)
# - Activer "Connect To Predefined Network" sur app et web
# - DB_HOST = hostname interne de la MariaDB mutualisée (réseau coolify)
# - Assigner le domaine au service "web"
# - Variables DB_* définies dans l'interface Coolify

services:
  app:
    build: .
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    restart: unless-stopped
    networks:
      - internal
      - coolify

  web:
    image: nginx:1.26-alpine
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify

networks:
  internal:
    driver: bridge
  coolify:
    external: true

volumes:
  vendor_data:
