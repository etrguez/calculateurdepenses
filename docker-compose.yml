# =============================================
# DOCKER-COMPOSE - CALCULATEUR DE DÉPENSES
# Nginx + PHP-FPM (MariaDB externe / mutualisée Coolify)
# =============================================

services:
  app:
    build: .
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    env_file:
      - .env.example
    environment:
      - ENVIRONMENT=development
    restart: unless-stopped

  web:
    image: nginx:1.26-alpine
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  vendor_data:
